name: gabby-eval

# Runs the Gabby regression suite against the deployed prod endpoint.
#
# When: on every push to main AND nightly at 06:00 UTC (so we catch
# silent drift from dependency bumps / model changes even if nobody
# pushed that day).
#
# Why not on PRs? The eval hits a live store's real inventory via the
# deployed URL. PR branches don't have a reliable deployed URL yet
# (Vercel preview URLs are per-deploy and not trivial to resolve from
# GitHub Actions without extra plumbing). Post-merge + nightly catches
# regressions within an hour, which is good enough for now. Upgrade
# path: have Vercel comment the preview URL, parse it, run the eval
# against the preview.
#
# Failure modes this catches:
#   - prompt changes that break safety negatives (underage, drunk
#     customer, medical advice) — these are ship-blockers
#   - prompt changes that regress pairing/style recommendations
#   - model/endpoint outages (the runner exits non-zero on HTTP 5xx)
#
# Requires two GitHub Actions secrets:
#   BEVTEK_EVAL_STORE_ID  — a UUID of a real store with live inventory
#   (We don't need an ANTHROPIC_API_KEY here — the eval calls our own
#   deployed endpoint, which uses Vercel's env var for Claude.)

on:
  push:
    branches: [main]
  schedule:
    # 06:00 UTC = 01:00 America/New_York (store owners are asleep,
    # Anthropic rate-limit bucket is full, Vercel cold-start penalty
    # hurts nobody).
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  eval:
    name: run eval against prod
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    # Opt into Node 24 for the JS actions themselves (checkout,
    # setup-node, upload-artifact, pnpm/action-setup). GitHub is
    # removing Node 20 from runners on 2026-09-16; this env forces
    # the modern runtime now so the warning stops firing and we
    # don't get surprised on the cutover date.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # IMPORTANT: pnpm must be installed BEFORE setup-node when we
      # use setup-node's cache: pnpm feature — otherwise it can't
      # resolve the store path. We keep that order even without the
      # cache so the pattern is consistent.
      #
      # We deliberately do NOT pass `version:` here. Passing an
      # explicit version collides with `packageManager: "pnpm@X.Y.Z"`
      # in root package.json and fails with ERR_PNPM_BAD_PM_VERSION.
      # Action-setup auto-detects the pinned version from
      # package.json when `version` is omitted, which is what we want.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS. Node 20 is deprecated on GitHub runners and
          # pnpm 10 supports 22 natively.
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Gabby eval
        env:
          BEVTEK_EVAL_URL: https://bevtek-web.vercel.app
          BEVTEK_EVAL_STORE_ID: ${{ secrets.BEVTEK_EVAL_STORE_ID }}
          # Concurrency 1 — the Anthropic rate-limit ceiling this hits
          # in aggregate is shared with real live traffic. One-at-a-time
          # is slow (~2–3 min) but won't starve production.
          BEVTEK_EVAL_CONCURRENCY: "1"
        run: pnpm eval:gabby

      - name: Upload results
        # Keep the timestamped report so we can scroll back through a
        # week of passes/fails when triaging a regression.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gabby-eval-results
          path: scripts/eval-results/
          retention-days: 30
          # If the eval crashed before writing any output (e.g. a 5xx
          # from prod), the results directory won't exist. Silence the
          # "no files found" warning in that case — the job log is
          # already red and tells the real story.
          if-no-files-found: ignore
